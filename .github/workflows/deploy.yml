name: Deploy to JATOS

on:
  push:
    branches:
      - main
    paths:
      - '**.html'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Upload HTML files to JATOS mindprobe
        env:
          JATOS_REMOTE_URL: ${{ secrets.JATOS_REMOTE_URL }}
          JATOS_REMOTE_TOKEN: ${{ secrets.JATOS_REMOTE_TOKEN }}
        run: |
          STUDY_UUID="2258638b-1e40-4a76-9c2a-bad96df69fab"
          for file in *.html; do
            echo "📤 Uploading $file..."
            curl -v -o response.txt -w "Status: %{http_code}\n" \
              -X POST \
              -H "Authorization: Bearer $JATOS_REMOTE_TOKEN" \
              -F "file=@$file;type=text/html" \
              "$JATOS_REMOTE_URL/jatos/api/v1/studies/$STUDY_UUID/studyAssets/$file"
            cat response.txt
            echo ""
          done